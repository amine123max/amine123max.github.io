{{- /* Head custom content area start */ -}}

<script>
  (function() {
    var lang = 'en';
    try {
      lang = (localStorage.getItem('site-lang') || 'en').toLowerCase();
    } catch (error) {
      lang = 'en';
    }
    if (lang !== 'zh') {
      lang = 'en';
    }
    document.documentElement.setAttribute('data-site-lang', lang);
  })();
</script>

{{ if or
  .IsHome
  (eq .Layout "tools")
  (eq .Layout "tool_onestep")
  (eq .Layout "tool_resume_builder")
}}
<link rel="stylesheet" href="/css/cv-download.css">
{{ end }}

{{- /* Head custom content area end */ -}}
